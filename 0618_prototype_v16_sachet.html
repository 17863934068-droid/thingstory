<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Memory Service · Sachet Walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app"></div>

<style>
  :root{
    /* 页面深底 — 对齐 slide 视觉系统 */
    --page:#1a1410;
    --page2:#241b16;
    --rail-line:#3a2f28;
    --rail-text:#f3eee3;
    --rail-sub:#a89c8a;
    --rail-faint:#7a6f64;
    --rail-cardbg:#221912;

    /* 品牌强调色 */
    --vermil:#b3402f;
    --vermil-deep:#8c2f23;
    --gold:#c98b2e;
    --jade:#7a8c6f;

    /* 手机屏幕内 (app 内部仍是浅色,但对齐同系统) */
    --screen:#fbf8f1;
    --screen2:#f3eee3;
    --ink:#2b2622;
    --sub:#6b6258;
    --faint:#9a9186;
    --line:#cfc6b6;
    --line2:#e8e0d0;
    --tint:#fdf3e2;
    --green-soft:#e3eadb;

    --serif:'Cormorant Garamond','Songti SC','STSong',Georgia,serif;
    --sans:'Noto Sans SC','PingFang SC','Hiragino Sans GB',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--page);min-height:100vh}
  #app{font-family:var(--sans);color:var(--rail-text);background:var(--page);
    min-height:100vh;padding:36px 30px 60px;display:flex;justify-content:center}
  .wrap{width:100%;max-width:1200px}

  /* ===== 顶部 ===== */
  header.top{border-bottom:1px solid var(--rail-line);padding-bottom:20px;margin-bottom:14px}
  header.top .kicker{font-size:10.5px;letter-spacing:3.5px;color:var(--vermil);font-weight:700;text-transform:uppercase}
  header.top h1{font-family:var(--serif);font-size:32px;font-weight:600;margin-top:8px;letter-spacing:-.3px}
  header.top h1 em{font-style:italic;color:var(--gold)}
  header.top .sub{color:var(--rail-sub);font-size:13px;margin-top:6px;letter-spacing:.3px}

  /* ===== 语言切换 ===== */
  .lang-toggle{border:1px solid var(--rail-line);background:var(--page2);color:var(--rail-sub);font-size:11px;font-weight:700;letter-spacing:1.5px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:.18s;flex:none;margin-top:6px}
  .lang-toggle:hover{background:var(--rail-line);color:var(--rail-text)}

  /* ===== 进度 dot ===== */
  .prog{display:flex;gap:4px;align-items:center;margin:22px 0 6px;flex-wrap:wrap}
  .pd{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--rail-faint);
    padding:7px 13px;border-radius:22px;border:1px solid transparent;cursor:pointer;transition:.18s}
  .pd:hover{background:var(--page2);color:var(--rail-sub)}
  .pd .n{width:21px;height:21px;border-radius:50%;background:var(--rail-line);color:var(--rail-sub);
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--serif)}
  .pd.on{color:var(--rail-text);background:var(--page2);border-color:var(--rail-line)}
  .pd.on .n{background:var(--rail-text);color:var(--page)}
  .pd.done{color:var(--rail-sub)}
  .pd.done .n{background:var(--vermil);color:#fff}
  .pd .arr{color:var(--rail-line);margin-left:0px;font-size:10px}

  /* ===== 两栏布局 ===== */
  .stage-grid{display:grid;grid-template-columns:348px 1fr;gap:46px;margin-top:24px;align-items:start}

  /* ===== 手机外壳 ===== */
  .phone{width:348px;height:722px;position:sticky;top:24px;border-radius:58px;padding:11px;
    background:linear-gradient(155deg,#3a3a3f 0%,#1c1c1f 28%,#2a2a2d 52%,#161618 78%,#36363a 100%);
    box-shadow:0 1px 1px rgba(255,255,255,.16) inset,0 0 0 2px #0b0b0d,
      0 2px 6px rgba(0,0,0,.45),0 30px 60px -22px rgba(0,0,0,.6),0 56px 96px -44px rgba(0,0,0,.45)}
  .phone .vbtn{position:absolute;left:-2px;border-radius:3px;width:3px;
    background:linear-gradient(#43434a,#1c1c1f);box-shadow:-1px 0 1px rgba(0,0,0,.4)}
  .phone .vbtn.mute{top:124px;height:30px}
  .phone .vbtn.up{top:172px;height:56px}
  .phone .vbtn.dn{top:236px;height:56px}
  .phone .pwr{position:absolute;right:-2px;top:178px;width:3px;height:80px;border-radius:3px;
    background:linear-gradient(#43434a,#1c1c1f);box-shadow:1px 0 1px rgba(0,0,0,.4)}
  .screen{width:100%;height:100%;background:var(--screen);border-radius:47px;overflow:hidden;
    display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;
    -webkit-box-orient:vertical;-webkit-flex-direction:column;-ms-flex-direction:column;
    flex-direction:column;position:relative;box-shadow:0 0 0 1px rgba(0,0,0,.55) inset}
  .notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:108px;height:30px;
    background:#000;border-radius:16px;z-index:20}
  .notch::after{content:"";position:absolute;right:12px;top:50%;transform:translateY(-50%);
    width:8px;height:8px;border-radius:50%;background:#0c1216;
    box-shadow:0 0 0 1px rgba(255,255,255,.05),0 0 2px rgba(80,140,180,.5) inset}
  .sbar{padding:18px 28px 2px;display:flex;justify-content:space-between;align-items:center;
    font-size:12px;font-weight:600;color:var(--ink);flex:none}
  .sbar .rgt{display:flex;align-items:center;gap:5px}
  .sbar .rgt svg{display:block}
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:124px;height:5px;border-radius:3px;background:rgba(43,38,34,.26);z-index:20}
  .appbar{padding:10px 20px 12px;display:flex;align-items:center;gap:8px;flex:none;position:relative;
    border-bottom:1px solid var(--line2)}
  .appbar .back{font-size:20px;color:var(--sub);cursor:pointer;width:22px;flex:none;line-height:1}
  .appbar .ttl{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--ink);letter-spacing:-.2px;flex:none}
  .appbar .step{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:9.5px;color:var(--faint);letter-spacing:1.5px;font-weight:600}
  .scr-body{flex:1;overflow-y:auto;padding:14px 20px 30px;color:var(--ink)}
  .scr-body::-webkit-scrollbar{width:0}

  /* ===== 屏幕内通用文字 ===== */
  h2.sh{font-family:var(--serif);font-size:18px;margin:4px 0 3px;font-weight:600}
  .ssub{font-size:11.5px;color:var(--faint);margin-bottom:14px;line-height:1.55}

  /* ===== 物件展示 ===== */
  .obj-empty{height:160px;border-radius:14px;border:1.5px dashed #c9b48a;
    background:repeating-linear-gradient(45deg,#f5ecd8,#f5ecd8 9px,#f1e6cf 9px,#f1e6cf 18px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9a824f;gap:8px}
  .obj-empty .ic{font-size:34px}
  .obj-empty .lb{font-size:11px}

  .obj-photo{position:relative;border-radius:14px;overflow:hidden;background:#1a1410;
    aspect-ratio:1/1;display:flex;align-items:flex-end}
  .obj-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .obj-photo .meta{position:absolute;left:10px;bottom:10px;background:rgba(15,10,7,.75);
    color:#f3eee3;font-size:10.5px;padding:4px 9px;border-radius:6px;backdrop-filter:blur(4px)}
  .obj-photo.small{aspect-ratio:1.4/1}

  .field{margin-top:13px}
  .field label{font-size:9.5px;color:var(--faint);letter-spacing:1.5px;font-weight:600;text-transform:uppercase}
  .inp{margin-top:5px;width:100%;background:#fff;border:1px solid var(--line2);border-radius:10px;
    padding:11px 12px;font-size:13px;color:var(--ink);font-family:var(--sans)}
  .inp:focus{outline:none;border-color:var(--gold)}
  .inp.ai{border-color:#d8c39a;background:#fdf8ee}
  .ai-tag{font-size:8.5px;color:var(--gold);font-weight:700;margin-left:6px;letter-spacing:1px}

  /* ===== 按钮 ===== */
  .btn{margin-top:18px;width:100%;border:none;border-radius:12px;background:var(--ink);color:var(--screen);
    font-family:var(--sans);font-size:13.5px;font-weight:600;padding:13px;cursor:pointer;transition:.15s;
    letter-spacing:.3px;
    box-shadow:
      2px 3px 8px -1px rgba(43,38,34,.18),
      4px 7px 16px -3px rgba(43,38,34,.12),
      7px 12px 28px -6px rgba(43,38,34,.06)}
  .btn:hover{background:var(--vermil);
    box-shadow:
      3px 5px 12px -1px rgba(43,38,34,.24),
      6px 10px 22px -3px rgba(43,38,34,.16),
      10px 16px 36px -6px rgba(43,38,34,.08)}
  .btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--line);
    box-shadow:none}
  .btn.ghost:hover{background:var(--screen2);color:var(--ink);box-shadow:none}
  .btn.gold{background:var(--vermil);
    box-shadow:
      2px 3px 8px -1px rgba(140,47,35,.25),
      4px 7px 16px -3px rgba(140,47,35,.16),
      7px 12px 28px -6px rgba(140,47,35,.08)}
  .btn.gold:hover{background:var(--vermil-deep);
    box-shadow:
      3px 5px 12px -1px rgba(140,47,35,.32),
      6px 10px 22px -3px rgba(140,47,35,.22),
      10px 16px 36px -6px rgba(140,47,35,.10)}
  .btn:active{transform:translateY(1px);
    box-shadow:
      1px 2px 5px -1px rgba(43,38,34,.20),
      2px 4px 10px -3px rgba(43,38,34,.12)}
  .btn[disabled]{opacity:.4;cursor:default;box-shadow:none}
  .btn[disabled]:hover{box-shadow:none}
  .btnrow{display:flex;gap:9px;margin-top:14px}
  .btnrow .btn{margin-top:0}

  /* ===== 对话流 ===== */
  .chat{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .msg{max-width:84%;padding:9px 12px;border-radius:14px;font-size:12.5px;line-height:1.55;
    animation:slidein .35s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg .who{font-size:9.5px;color:var(--faint);margin-bottom:3px;font-weight:600;letter-spacing:.4px}
  .msg.them{background:#fff;border:1px solid var(--line2);align-self:flex-start;border-top-left-radius:4px}
  .msg.me{background:var(--green-soft);align-self:flex-end;border-top-right-radius:4px}
  .msg.ai{background:var(--tint);border:1px dashed #d8c39a;align-self:center;max-width:96%;
    font-size:11px;color:#7a5a1f}
  .msg.ai b{color:var(--vermil)}

  /* ===== 卡片 ===== */
  .pcard{background:#fff;border:1px solid var(--line2);border-radius:13px;padding:13px;
    margin-bottom:10px;cursor:pointer;transition:.15s}
  .pcard:hover{border-color:var(--gold)}
  .pcard.picked{border-color:var(--vermil);background:#fdf6f4}
  .pcard .lbl{font-size:8.5px;letter-spacing:1.6px;color:var(--vermil);font-weight:700}
  .pcard .q{font-size:13px;font-family:var(--serif);margin-top:6px;line-height:1.5;font-weight:500}
  .pickedflag{font-size:9px;color:var(--vermil);float:right;font-weight:700}

  /* ===== 录音 ===== */
  .reccard{margin-top:6px;background:#fff;border:1px solid var(--line2);border-radius:13px;
    padding:18px 14px;text-align:center}
  .rec-dot{width:58px;height:58px;border-radius:50%;background:var(--vermil);margin:4px auto 10px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;
    box-shadow:0 0 0 0 rgba(179,64,47,.5);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(179,64,47,.45)}70%{box-shadow:0 0 0 18px rgba(179,64,47,0)}100%{box-shadow:0 0 0 0 rgba(179,64,47,0)}}
  @media(prefers-reduced-motion:reduce){.rec-dot{animation:none}}
  .rec-time{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}
  .rec-lb{font-size:10.5px;color:var(--faint);margin-top:3px}

  /* ===== 实时追问层 (NEW) ===== */
  .listen{margin-top:14px;border-top:1px dashed var(--line);padding-top:13px}
  .listen-head{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:1.6px;
    color:var(--vermil);font-weight:700;margin-bottom:10px}
  .listen-head .pulse{width:7px;height:7px;border-radius:50%;background:var(--vermil);
    animation:pulse2 1.2s infinite}
  @keyframes pulse2{0%,100%{opacity:.5}50%{opacity:1}}
  .followup{background:#fdf8ee;border:1px solid #d8c39a;border-radius:11px;padding:10px 11px;
    margin-bottom:8px;animation:appear .5s ease;position:relative}
  @keyframes appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .followup.used{background:#e8e0d0;border-color:var(--line);opacity:.6}
  .followup .ft{font-size:8.5px;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:4px}
  .followup .fq{font-size:12px;font-family:var(--serif);color:var(--ink);line-height:1.5;font-weight:500}
  .followup .fa{display:flex;gap:6px;margin-top:8px}
  .followup .fa span{font-size:10.5px;padding:4px 9px;border-radius:7px;cursor:pointer;font-weight:600;
    transition:.12s;letter-spacing:.3px}
  .followup .fa .use{background:var(--vermil);color:#fff}
  .followup .fa .use:hover{background:var(--vermil-deep)}
  .followup .fa .skip{background:transparent;color:var(--sub);border:1px solid var(--line)}
  .followup .fa .skip:hover{background:var(--screen2)}
  .followup.used .fa{display:none}
  .followup.used::after{content:"已采用 ✓";position:absolute;right:11px;top:11px;
    font-size:9px;color:var(--vermil);font-weight:700;letter-spacing:.5px}
  .listen-empty{font-size:10.5px;color:var(--faint);text-align:center;padding:14px 0;
    font-style:italic}

  /* ===== 生成进度 ===== */
  .gen{margin-top:30px;text-align:center}
  .genspin{width:44px;height:44px;border-radius:50%;
    border:3px solid var(--line2);border-top-color:var(--vermil);
    margin:0 auto 14px;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .genline{font-size:12px;color:var(--sub);margin:6px 0;opacity:0;animation:fade .4s forwards;
    text-align:left;padding-left:24px;position:relative}
  .genline::before{content:"✓";position:absolute;left:4px;color:var(--vermil);font-weight:700}
  @keyframes fade{to{opacity:1}}

  /* ===== Story Card / 图鉴卡 ===== */
  .storycard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
    margin-top:8px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .storycard .band{height:90px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#caa15a 0%,#b3402f 60%,#8c2f23 100%)}
  .storycard .band::before{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.15),transparent 60%)}
  .storycard .band .crest{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    font-family:var(--serif);font-size:11px;color:#f3eee3;letter-spacing:4px;font-weight:500}

  /* 物品图鉴卡 · 把香包照片作为头部 */
  .storycard .photo-band{height:170px;position:relative;overflow:hidden;background:#1a1410}
  .storycard .photo-band img{width:100%;height:100%;object-fit:cover;display:block}
  .storycard .photo-band::after{content:"";position:absolute;inset:0;
    background:linear-gradient(to bottom,transparent 55%,rgba(15,10,7,.55) 100%)}
  .storycard .photo-band .label{position:absolute;left:14px;bottom:10px;color:#f3eee3;
    font-family:var(--serif);font-size:11.5px;letter-spacing:3px;font-weight:500;z-index:1}
  .storycard .bd{padding:14px 14px 16px}
  .storycard h4{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink)}
  .storycard .mt{font-size:10.5px;color:var(--faint);margin:3px 0 12px;letter-spacing:.5px}
  .tl{font-size:11.5px;margin-bottom:8px;padding-left:18px;position:relative;color:var(--sub);
    line-height:1.5}
  .tl::before{content:'';position:absolute;left:0;top:6px;width:7px;height:7px;border-radius:50%;
    background:var(--vermil)}
  .tl .yr{display:inline-block;font-family:var(--serif);font-weight:700;color:var(--ink);
    margin-right:8px;font-size:12.5px}
  .hook{margin-top:12px;background:var(--tint);border:1px dashed #d8c39a;border-radius:10px;
    padding:10px 11px;font-size:11px;color:#7a5a1f;line-height:1.55;font-style:italic}

  /* ===== 产品 grid ===== */
  .prodset{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
  .prod{background:#fff;border:1px solid var(--line2);border-radius:11px;padding:11px;cursor:pointer;
    transition:.15s;position:relative}
  .prod:hover{border-color:var(--gold);transform:translateY(-2px)}
  .prod .pic{font-size:22px}
  .prod .pn{font-size:11.5px;font-weight:700;font-family:var(--serif);margin-top:7px;color:var(--ink)}
  .prod .pd2{font-size:9.5px;color:var(--faint);margin-top:3px;line-height:1.45}

  /* 多选状态 */
  .prod.select-mode{opacity:.45;filter:grayscale(.5)}
  .prod.select-mode.on{opacity:1;filter:none;border-color:var(--vermil);background:#fdf6f4}
  .prod.select-mode.on::after{content:"✓";position:absolute;top:7px;right:9px;
    width:16px;height:16px;border-radius:50%;background:var(--vermil);color:#fff;
    font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}

  .selnote{margin-top:10px;font-size:10.5px;color:var(--faint);text-align:center;letter-spacing:.3px}
  .selnote b{color:var(--vermil);font-weight:700}

  /* ===== 产品 gallery (stage 5) ===== */
  .ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .gcard{border:1px solid var(--line2);border-radius:12px;overflow:hidden;background:#fff;cursor:pointer;
    transition:.18s;position:relative;
    box-shadow:
      2px 3px 7px -1px rgba(43,38,34,.10),
      4px 7px 16px -3px rgba(43,38,34,.06),
      7px 12px 28px -6px rgba(43,38,34,.04)}
  .gcard:hover{border-color:var(--gold);transform:translateY(-2px);
    box-shadow:
      3px 5px 11px -1px rgba(43,38,34,.15),
      6px 10px 22px -3px rgba(43,38,34,.10),
      10px 16px 36px -6px rgba(43,38,34,.06)}
  .gcard .gh{height:62px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff}
  .gcard .gb{padding:10px 11px 12px}
  .gcard h5{font-size:12px;font-family:var(--serif);font-weight:700;color:var(--ink)}
  .gcard .gt{font-size:9px;color:var(--vermil);font-weight:700;letter-spacing:1.2px;margin:3px 0 6px}
  .gcard p{font-size:10px;color:var(--sub);line-height:1.5}
  .gcard p em{font-style:normal;color:var(--ink);font-weight:600}

  /* ===== Activity (stage 6 · 上半屏 · 主动延续) ===== */
  .actlist{margin-top:10px;display:flex;flex-direction:column;gap:11px}
  .actcard{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff;
    transition:.18s;position:relative}
  .actcard.highlight{border-color:var(--vermil);box-shadow:0 0 0 3px rgba(179,64,47,.12)}
  .actcard .ah{display:flex;align-items:center;gap:11px;padding:11px 13px;color:#fff}
  .actcard .ah > div{flex:1;min-width:0}
  .actcard .ah .ae{font-size:22px;flex:none}
  .actcard .ah .acat{font-size:12.5px;font-weight:700;font-family:var(--serif)}
  .actcard .ah .aeg{font-size:9.5px;opacity:.85;margin-top:1px}
  .actcard .ab{padding:11px 13px}
  .actcard .arow{display:flex;align-items:baseline;gap:8px}
  .actcard .badge{font-size:9px;font-weight:700;color:var(--vermil);background:#fbeae6;
    border:1px solid #e6b8af;border-radius:14px;padding:2px 8px;flex:none;letter-spacing:.5px}
  .actcard .aact{font-size:13px;font-family:var(--serif);font-weight:700;color:var(--ink)}
  .actcard .ahow{font-size:11px;color:var(--sub);line-height:1.5;margin-top:6px}
  .actcard .aval{font-size:9.5px;color:var(--faint);margin-top:7px;letter-spacing:.3px}
  .pickflag{position:absolute;top:9px;right:11px;font-size:9px;color:#fff;background:var(--vermil);
    padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.5px;z-index:2}

  /* 折叠态: 只显示 header,右侧 chevron 箭头 */
  .actcard.collapsible .ah{cursor:pointer;transition:filter .15s}
  .actcard.collapsible .ah:hover{filter:brightness(1.10)}
  .actcard.collapsed .ab{display:none}
  .actcard .ah-arrow{flex:none;width:20px;height:20px;display:flex;align-items:center;
    justify-content:center;transition:transform .25s ease;color:rgba(255,255,255,.85)}
  .actcard.collapsible:not(.collapsed) .ah-arrow{transform:rotate(180deg)}

  /* ===== 两层之间的分隔 ===== */
  .layer-divider{margin:24px -4px 6px;display:flex;align-items:center;gap:10px}
  .layer-divider .ln{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--line),transparent)}
  .layer-divider .lbl{font-size:9px;letter-spacing:2.5px;color:var(--vermil);font-weight:700;
    text-transform:uppercase}

  /* ===== 屏内小标题(分层用) ===== */
  .layer-title{margin-top:4px}
  .layer-title h3{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink);
    letter-spacing:-.1px}
  .layer-title h3 .en{font-size:10px;letter-spacing:2px;color:var(--vermil);font-weight:700;
    margin-left:8px;font-family:var(--sans)}
  .layer-title .lead{font-size:11px;color:var(--faint);margin-top:3px;line-height:1.5}

  /* ===== Echo 列表 (下半屏 · 被动回响) ===== */
  .echolist{margin-top:11px;display:flex;flex-direction:column;gap:9px}
  .echo{background:#fdf8ee;border:1px solid #d8c39a;border-left:3px solid var(--vermil);
    border-radius:11px;padding:11px 12px;cursor:pointer;transition:.18s}
  .echo:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.06)}
  .echo .e-trigger{display:flex;align-items:center;gap:7px;font-size:9.5px;color:var(--vermil);
    font-weight:700;letter-spacing:.6px;margin-bottom:6px}
  .echo .e-trigger .kind{font-size:8.5px;color:var(--gold);background:#fff;border:1px solid #e0d0a8;
    padding:2px 7px;border-radius:10px;letter-spacing:.5px;margin-left:auto}
  .echo .e-title{font-family:var(--serif);font-size:13px;color:var(--ink);font-weight:600;
    line-height:1.45}
  .echo .e-desc{font-size:11px;color:#7a5a1f;line-height:1.6;margin-top:5px}

  /* echo 卡底部的"加入提醒/已加入"行 (默认就显示,让可点性可见) */
  .echo .e-action{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:8px;
    border-top:1px dashed #d8c39a;font-size:10.5px;color:var(--gold);font-weight:700;
    letter-spacing:.4px;transition:.18s}
  .echo .e-action .ck{width:14px;height:14px;border-radius:50%;background:var(--gold);
    color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;
    justify-content:center;line-height:1}
  .echo .e-action .sub{margin-left:auto;color:#a89c8a;font-weight:400;letter-spacing:.2px;
    font-style:italic;font-size:9.5px}

  /* 激活态 */
  .echo.on{background:#f0f3ec;border-color:#c5d1be;border-left-color:var(--jade);border-left-width:4px}
  .echo.on .e-trigger{color:#3a4a35}
  .echo.on .e-trigger .kind{color:var(--jade);border-color:#c5d1be;background:#f6f8f3}
  .echo.on .e-desc{color:#5a6a52}
  .echo.on .e-action{border-top-color:#c5d1be;color:var(--jade)}
  .echo.on .e-action .ck{background:var(--jade)}
  .echo.on .e-action .sub{color:#7a8c6f}

  .optnote{margin-top:14px;background:var(--tint);border:1px dashed #d8c39a;border-radius:11px;
    padding:11px 13px;font-size:10.5px;color:#7a5a1f;line-height:1.6}

  /* ===== 右侧 rail (深底文字) ===== */
  .rail{padding-top:8px}
  .rail .k{font-size:10.5px;letter-spacing:3px;color:var(--vermil);font-weight:700;text-transform:uppercase}
  .rail h3{font-family:var(--serif);font-size:32px;margin:12px 0 6px;color:var(--rail-text);
    font-weight:600;letter-spacing:-.4px;line-height:1.15}
  .rail h3 em{font-style:italic;color:var(--gold)}
  .rail .role{font-size:12.5px;color:var(--rail-sub);margin-bottom:22px;letter-spacing:.3px;font-style:italic}
  .rail .blk{margin-bottom:18px}
  .rail .blk .bl{font-size:10px;letter-spacing:1.8px;color:var(--gold);font-weight:700;margin-bottom:7px;
    text-transform:uppercase}
  .rail .blk p{font-size:13.5px;color:var(--rail-text);line-height:1.65;font-weight:300}
  .rail .blk p b{color:var(--gold);font-weight:500}
  .rail .quote{margin:18px 0;padding:12px 14px;border-left:2px solid var(--vermil);
    background:var(--rail-cardbg);border-radius:0 6px 6px 0;font-style:italic;
    font-family:var(--serif);font-size:14px;color:var(--rail-sub);line-height:1.5}
  .rail .hint{margin-top:20px;background:var(--rail-cardbg);border:1px solid var(--rail-line);
    border-radius:11px;padding:13px 15px;font-size:12px;color:var(--rail-sub);line-height:1.6}
  .rail .hint b{color:var(--vermil)}
  .rail .prodlist{margin-top:16px;border-top:1px solid var(--rail-line);padding-top:14px}
  .rail .prodlist .pl{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--rail-sub);
    margin-bottom:9px;line-height:1.5}
  .rail .prodlist .pl .e{font-size:16px;flex:none;line-height:1.2}
  .rail .prodlist .pl b{color:var(--rail-text);font-weight:500}

  /* ===== Modal ===== */
  .modal{position:fixed;inset:0;background:rgba(15,10,7,.78);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(4px)}
  .modal .box{background:var(--screen);border-radius:16px;max-width:460px;width:100%;overflow:hidden;
    border:1px solid var(--line);color:var(--ink);max-height:88vh;display:flex;flex-direction:column}
  .modal .mh{height:90px;display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;
    position:relative;overflow:hidden;flex:none}
  .modal .mh::before{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.18),transparent 60%)}
  .modal .mb{padding:22px 24px 24px;overflow-y:auto}
  .modal h4{font-family:var(--serif);font-size:19px;color:var(--ink);font-weight:600}
  .modal .mt2{font-size:10px;color:var(--vermil);font-weight:700;margin:5px 0 14px;letter-spacing:1.5px}
  .modal p{font-size:13px;color:var(--sub);line-height:1.65;margin-bottom:10px}
  .modal .x{float:right;cursor:pointer;color:var(--faint);font-size:22px;margin:-4px -4px 0 0;line-height:1}

  /* 博物馆已收录列表 */
  .museum-head{margin-top:18px;padding-top:14px;border-top:1px solid var(--line2);
    font-size:9.5px;color:var(--vermil);font-weight:700;letter-spacing:1.8px;margin-bottom:11px}
  .museum-list{display:flex;flex-direction:column;gap:9px}
  .mitem{display:flex;gap:11px;padding:12px;background:#fff;border:1px solid var(--line2);
    border-radius:11px;align-items:flex-start}
  .mitem.unlocked{border-left:3px solid var(--vermil)}
  .mitem.locked{opacity:.6;border-style:dashed}
  .mitem .mi-thumb{width:52px;height:52px;border-radius:9px;overflow:hidden;flex:none;
    background:#1a1410;display:flex;align-items:center;justify-content:center;color:#7a6f64;font-size:20px}
  .mitem .mi-thumb img{width:100%;height:100%;object-fit:cover}
  .mitem .mi-body{flex:1;min-width:0}
  .mitem .mi-title{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .mitem .mi-title h6{font-family:var(--serif);font-size:13.5px;font-weight:600;color:var(--ink)}
  .mitem .mi-title .mi-tag{font-size:8.5px;font-weight:700;letter-spacing:.8px;flex:none}
  .mitem.unlocked .mi-tag{color:var(--vermil)}
  .mitem.locked .mi-tag{color:var(--faint)}
  .mitem .mi-desc{font-size:11px;color:var(--sub);line-height:1.55;margin-top:5px}
  .mitem.locked .mi-desc{color:var(--faint);font-style:italic}
  .museum-cta{margin-top:14px;text-align:center;font-size:10.5px;color:var(--faint);
    font-style:italic;line-height:1.5}

  /* ===== 家庭物件库 (Stage 5 顶部) ===== */
  .shelf{margin-bottom:18px}
  .shelf-head{display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line2)}
  .shelf-head h3{font-family:var(--serif);font-size:15.5px;font-weight:600;color:var(--ink);
    letter-spacing:-.1px}
  .shelf-head .count{font-size:9.5px;color:var(--faint);letter-spacing:.6px;font-weight:500}

  .shelf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sheet-item{background:#fff;border:1px solid var(--line2);border-radius:11px;overflow:hidden;
    cursor:pointer;transition:.18s;display:flex;flex-direction:column;
    box-shadow:
      2px 3px 7px -1px rgba(43,38,34,.10),
      4px 7px 16px -3px rgba(43,38,34,.06),
      7px 12px 28px -6px rgba(43,38,34,.04)}
  .sheet-item:hover{border-color:var(--gold);transform:translateY(-2px);
    box-shadow:
      3px 5px 11px -1px rgba(43,38,34,.15),
      6px 10px 22px -3px rgba(43,38,34,.10),
      10px 16px 36px -6px rgba(43,38,34,.06)}
  .sheet-item .thumb{aspect-ratio:1/1;overflow:hidden;background:#1a1410;position:relative}
  .sheet-item .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .sheet-item.locked{cursor:default;box-shadow:none}
  .sheet-item.locked:hover{transform:none;border-color:var(--line2);box-shadow:none}
  .sheet-item.locked .thumb{display:flex;align-items:center;justify-content:center;
    color:#a89c8a;font-size:26px;background:#f3eee3;border-bottom:1px dashed var(--line2)}
  .sheet-item .meta{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column;
    justify-content:space-between;gap:3px}
  .sheet-item .meta .name{font-family:var(--serif);font-size:11.5px;font-weight:600;
    color:var(--ink);line-height:1.3}
  .sheet-item .meta .status{font-size:8.5px;color:var(--vermil);letter-spacing:.4px;
    font-weight:700;text-transform:uppercase}
  .sheet-item .meta .status.done{color:var(--jade)}
  .sheet-item.locked .meta .name{color:var(--faint);font-style:italic}
  .sheet-item.locked .meta .status{color:var(--faint);font-weight:500;text-transform:none;
    letter-spacing:.3px}

  /* shelf 与下方"六种记录方式"之间的分隔 */
  .sheet-divider{margin:18px 0 12px;display:flex;align-items:center;gap:10px}
  .sheet-divider .ln{flex:1;height:1px;background:var(--line2)}
  .sheet-divider .lbl{font-size:9px;letter-spacing:1.8px;color:var(--vermil);font-weight:700;
    text-transform:uppercase}
  .sheet-divider .lbl.muted{color:var(--faint)}

  /* 物件卡的"已完整记录"态 (P4 生成后) — 右下软阴影,而不是侧边色条 */
  .sheet-item.done{
    box-shadow:
      2px 3px 7px -1px rgba(122,140,111,.28),
      4px 7px 16px -3px rgba(122,140,111,.18),
      7px 12px 28px -6px rgba(122,140,111,.10)
  }
  .sheet-item.done:hover{
    transform:translateY(-2px);
    box-shadow:
      3px 5px 11px -1px rgba(122,140,111,.34),
      6px 10px 22px -3px rgba(122,140,111,.22),
      10px 16px 36px -6px rgba(122,140,111,.13)
  }
  .sheet-item.done .status{color:var(--jade)}

  /* 早期状态的引导提示框 (P1 完成后,还没补全故事时) */
  .empty-hint{margin-top:6px;padding:13px 14px;background:#fdf8ee;border:1px dashed #d8c39a;
    border-radius:11px;font-size:11px;color:#7a5a1f;line-height:1.65;text-align:left}
  .empty-hint b{color:var(--vermil);font-weight:700}
  .empty-hint .arrow{display:inline-block;margin:0 4px;color:var(--vermil)}

  /* 六种记录方式 - 锁定预览态 (早期状态下显示但不可点) */
  .gcard.locked{cursor:default;opacity:.45;filter:grayscale(.5);box-shadow:none}
  .gcard.locked:hover{transform:none;border-color:var(--line2);box-shadow:none}
  .gcard.locked::after{content:"🔒";position:absolute;top:6px;right:6px;font-size:10px;
    background:rgba(15,10,7,.45);color:#fff;width:18px;height:18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}

  /* ===== 响应式 ===== */
  @media(max-width:980px){
    .stage-grid{grid-template-columns:1fr;justify-items:center}
    .rail{max-width:380px}
    .phone{position:static}
  }

  /* ===== 底部导航栏 (Bottom Tab Bar) ===== */
  .navbar{
    flex:none;
    background:var(--screen2);
    border-top:1px solid var(--line2);
    width:100%;
    box-sizing:border-box;
    display:-webkit-box;
    display:-webkit-flex;
    display:-ms-flexbox;
    display:flex;
    -webkit-box-orient:horizontal;
    -webkit-box-direction:normal;
    -webkit-flex-direction:row;
    -ms-flex-direction:row;
    flex-direction:row;
    -webkit-flex-wrap:nowrap;
    -ms-flex-wrap:nowrap;
    flex-wrap:nowrap;
    -webkit-align-items:flex-start;
    -ms-flex-align:start;
    align-items:flex-start;
    padding:8px 18px 14px;
    position:relative;
    margin-bottom:8px;
    transition:transform .28s ease,opacity .28s ease
  }
  .navbar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}

  .navitem{
    -webkit-box-flex:1;
    -webkit-flex:1 1 0;
    -ms-flex:1 1 0;
    flex:1 1 0;
    min-width:0;
    display:-webkit-box;
    display:-webkit-flex;
    display:-ms-flexbox;
    display:flex;
    -webkit-box-orient:vertical;
    -webkit-flex-direction:column;
    -ms-flex-direction:column;
    flex-direction:column;
    -webkit-align-items:center;
    -ms-flex-align:center;
    align-items:center;
    gap:3px;
    font-size:9px;
    color:var(--faint);
    letter-spacing:.3px;
    padding:4px 0;
    cursor:default;
    transition:color .2s;
    position:relative;
    text-align:center
  }
  .navitem .nav-ico{width:22px;height:22px;opacity:.55;color:var(--faint);
    transition:opacity .2s,color .2s;flex:none}
  .navitem.on{color:var(--vermil)}
  .navitem.on .nav-ico{opacity:1;color:var(--vermil)}

  /* FAB 中间凸起按钮 */
  .navitem.fab-slot{
    -webkit-box-flex:1;
    -webkit-flex:1 1 0;
    -ms-flex:1 1 0;
    flex:1 1 0;
    min-width:0;
    display:-webkit-box;
    display:-webkit-flex;
    display:-ms-flexbox;
    display:flex;
    -webkit-box-orient:vertical;
    -webkit-flex-direction:column;
    -ms-flex-direction:column;
    flex-direction:column;
    -webkit-align-items:center;
    -ms-flex-align:center;
    align-items:center;
    -webkit-justify-content:flex-end;
    -ms-flex-pack:end;
    justify-content:flex-end;
    position:relative;
    padding-top:24px
  }
  .fab{position:absolute;top:-20px;left:50%;transform:translateX(-50%);
    width:58px;height:58px;border-radius:50%;
    background:linear-gradient(145deg,#c14a37 0%,#a33a2a 55%,#8c2f23 100%);
    color:#fff;display:flex;align-items:center;justify-content:center;cursor:default;
    box-shadow:0 5px 16px rgba(140,47,35,.42),0 1px 3px rgba(0,0,0,.2);
    transition:.18s}

  /* 选中态 (P1 阶段) - 金色实色外环,非"发光" */
  .fab.on{box-shadow:0 0 0 3px var(--gold),
    0 5px 16px rgba(140,47,35,.42),0 1px 3px rgba(0,0,0,.2)}

  /* 可点击态 (P4 生成完之后 / P5 / P6) - 鼠标交互 */
  .fab.clickable{cursor:pointer}
  .fab.clickable:hover{transform:translateX(-50%) scale(1.04);
    box-shadow:0 7px 20px rgba(140,47,35,.5),0 1px 3px rgba(0,0,0,.2)}
  .fab.clickable.on:hover{box-shadow:0 0 0 3px var(--gold),
    0 7px 20px rgba(140,47,35,.5),0 1px 3px rgba(0,0,0,.2)}
  .fab.clickable:active{transform:translateX(-50%) scale(.94)}

  .fab svg{width:30px;height:30px}
  .fab-label{font-size:9px;color:var(--faint);letter-spacing:.3px;transition:color .2s}
  .navitem.fab-slot.on .fab-label{color:var(--vermil)}
</style>

                  <circle cx="7.5" cy="10" r="1.2"/>
                  <path d="M4.4 7.2a4.4 4.4 0 0 1 6.2 0" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M1.6 4.4a8.3 8.3 0 0 1 11.8 0" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <!-- 电池 -->
                <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
                  <rect x=".6" y=".6" width="19.5" height="9.8" rx="2.3" stroke="var(--ink)" stroke-width="1.2" opacity=".35"/>
                  <rect x="1.7" y="1.7" width="14.5" height="7.6" rx="1.5" fill="var(--ink)"/>
                  <path d="M21.3 3.8v3.4" stroke="var(--ink)" stroke-width="1.6" stroke-linecap="round" opacity=".4"/>
                </svg>
              </span>
            </div>
            <div class="appbar">
              <span class="back" onclick="prev()">${_navHistory.length>0?'‹':''}</span>
              <span class="ttl">${s.t}</span>
              <span class="step">${s.step}</span>
            </div>
            <div class="scr-body" id="scrbody">${s.render()}</div>
            ${navHTML()}
            <div class="home-ind"></div>
          </div>
        </div>
        ${railHTML(s)}
      </div>
    </div>
    ${S.modal?modalHTML(S.modal):''}
  `;

  // 恢复滚动位置(立即 + rAF 双保险)
  if(sameStage){
    const b = document.getElementById('scrbody');
    if(b){
      b.scrollTop = savedScroll;
      requestAnimationFrame(() => { b.scrollTop = savedScroll; });
    }
  }
  _lastDrawnStage = S.i;
}

function modalHTML(id){
  const p = PRODUCTS.find(x => x.id === id);
  if(!p) return '';
  return `<div class="modal" onclick="S.modal=null;draw()">
    <div class="box" onclick="event.stopPropagation()">
      <div class="mh" style="background:${p.c}">${p.e}</div>
      <div class="mb">
        <span class="x" onclick="S.modal=null;draw()">×</span>
        <h4>${p[LANG].n}</h4>
        <div class="mt2">${p.t}</div>
        <p>${p[LANG].d}</p>

        <div class="museum-head">${T('博物馆已收录','Museum archive')} · ${p[LANG].n}</div>
        <div class="museum-list">
          <div class="mitem unlocked">
            <div class="mi-thumb"><img src="${SACHET_IMG}" alt="${T('香包','sachet')}"></div>
            <div class="mi-body">
              <div class="mi-title">
                <h6>${T('奶奶的端午香包',"Grandma's Dragon Boat Sachet")}</h6>
                <span class="mi-tag">${T('已记录 ✓','Recorded ✓')}</span>
              </div>
              <div class="mi-desc">${p[LANG].scen}</div>
            </div>
          </div>
          <div class="mitem locked">
            <div class="mi-thumb">🔒</div>
            <div class="mi-body">
              <div class="mi-title">
                <h6>${T('下一件等待记录的老物','Next heirloom awaiting record')}</h6>
                <span class="mi-tag">${T('待解锁','Locked')}</span>
              </div>
              <div class="mi-desc">${T('继续拍下家中其他老物 · 这里会出现新的图鉴卡','Photograph more family heirlooms · new records will appear here')}</div>
            </div>
          </div>
        </div>
        <div class="museum-cta">${T('家庭记忆是慢慢积累的 · 一件物件一只图鉴卡','Family memory is built slowly · one heirloom, one record')}</div>
      </div>
    </div>
  </div>`;
}

// 底部导航栏
function navHTML(){
  const activeTab = STAGE_TAB_MAP[S.i];
  // 录音中(Stage 3 录音态) → 隐藏导航栏,让用户专注
  const isRecording = (S.i === 2 && S.recording !== null);
  const hiddenCls = isRecording ? 'hidden' : '';

  // FAB 可点击逻辑:只有任务流完成后才能 reset
  // P4 生成完毕 (S.i === 3 && S.generated === true) / P5 / P6
  const fabClickable = (S.i === 3 && S.generated === true) || S.i >= 4;

  return `<div class="navbar ${hiddenCls}">
    ${NAV_TABS.map((t, i) => {
      const on = (i === activeTab);
      if(t.isFab){
        const cls = ['fab', on?'on':'', fabClickable?'clickable':''].filter(Boolean).join(' ');
        const onclickAttr = fabClickable ? `onclick="reset()"` : '';
        const titleAttr = fabClickable
          ? `title="从头开始 · 拍下新一件老物"`
          : `title="任务进行中 · 完成图鉴卡后可重新开始"`;
        return `<div class="navitem fab-slot ${on?'on':''}">
          <div class="${cls}" ${onclickAttr} ${titleAttr}>
            ${NAV_ICONS[t.icon]}
          </div>
          <span class="fab-label">${t[LANG]}</span>
        </div>`;
      }
      return `<div class="navitem ${on?'on':''}">
        ${NAV_ICONS[t.icon]}
        <span>${t[LANG]}</span>
      </div>`;
    }).join('')}
  </div>`;
}
function openP(id){ S.modal = id; draw(); }

function next(){
  if(S.i < ST.length-1){
    _navHistory.push(S.i);   // 记录当前位置到历史
    S.i++;
    resetScreen();
    draw();
    scrollTop();
  }
}
function prev(){
  if(_navHistory.length > 0){
    S.i = _navHistory.pop();  // 回到历史栈顶
    draw();
    scrollTop();
  }
}
function jump(i){
  if(i !== S.i){
    _navHistory.push(S.i);   // 记录当前位置到历史
    S.i = i;
    draw();
    scrollTop();
  }
}
function scrollTop(){ const b = document.getElementById('scrbody'); if(b) b.scrollTop = 0; }
function resetScreen(){}

// =====================================================================
// Stage 2 · 家人补充对话动画
// =====================================================================
function shareNow(){
  S.shared = true;
  S.chatHTML = '';
  S.chatDone = false;
  draw();

  let k = 0;
  const chat_data = FAMILY_CHAT[LANG];
  const tick = () => {
    if(k < chat_data.length){
      const [c, who, txt] = chat_data[k];
      S.chatHTML += `<div class="msg ${c}">${who?`<div class="who">${who}</div>`:''}${txt}</div>`;
      // 直接更新 chat 内容,不调用 scrollIntoView,保持当前滚动位置
      const chat = document.getElementById('chat');
      if(chat) chat.innerHTML = S.chatHTML;
      k++;
      setTimeout(tick, 900);
    } else {
      S.chatDone = true;
      draw();
    }
  };
  setTimeout(tick, 500);
}

// =====================================================================
// Stage 3 · 录音 + 实时追问 (NEW)
// =====================================================================
let recTimer = null;
let followupTimer = null;

function startRecording(){
  S.recording = 0;
  S.recT = 0;
  S.followups = [];
  draw();

  // 计时器
  clearInterval(recTimer);
  recTimer = setInterval(() => {
    S.recT++;
    const el = document.getElementById('rectime');
    if(el){
      const m = String(Math.floor(S.recT/60)).padStart(2,'0');
      const s = String(S.recT%60).padStart(2,'0');
      el.textContent = `${m}:${s}`;
    }

    // 检查是否到了浮现追问的时间
    FOLLOWUPS[LANG].forEach((f, idx) => {
      if(S.recT === f.at && !S.followups.find(x => x.idx === idx)){
        S.followups.push({...f, idx, used:false});
        draw();
      }
    });
  }, 1000);
}

function useFollowup(i){
  S.followups[i].used = true;
  draw();
}

function skipFollowup(i){
  S.followups.splice(i, 1);
  draw();
}

function stopRecording(){
  clearInterval(recTimer);
  S.recording = null;
  S.picked = null;
  next();
}

// =====================================================================
// Stage 6 · Echo 加入提醒
// =====================================================================
function toggleEcho(idx){
  const i = S.echoEnabled.indexOf(idx);
  if(i >= 0) S.echoEnabled.splice(i, 1);
  else S.echoEnabled.push(idx);
  draw();
}

// Stage 6 · 折叠/展开非推荐的活动卡
function toggleActivity(idx){
  const i = S.expandedActivities.indexOf(idx);
  if(i >= 0) S.expandedActivities.splice(i, 1);
  else S.expandedActivities.push(idx);
  draw();
}

// =====================================================================
// Stage 4 · 多选 + 生成
// =====================================================================
function toggleType(id){
  const idx = S.selectedTypes.indexOf(id);
  if(idx >= 0) S.selectedTypes.splice(idx, 1);
  else S.selectedTypes.push(id);
  draw();
}

function generate(){
  S.generated = 'running';
  draw();

  const typeMap = {
    card:     T("生成可分享的故事卡片…","Generating a shareable story card…"),
    timeline: T("把家人补充串到时间轴…","Threading family additions into the timeline…"),
    archive:  T("构建数字档案库…","Building the digital archive…"),
    nfc:      T("准备 NFC 标签写入数据…","Preparing NFC tag data…")
  };
  const lines = [
    T("整理录音中的故事节点…","Organizing story nodes from recording…"),
    T("识别关键人物与年份…","Identifying key people and dates…"),
    ...S.selectedTypes.map(t => typeMap[t]).filter(Boolean)
  ];

  const host = () => document.getElementById('genlines');
  let k = 0;
  const tick = () => {
    const h = host();
    if(!h) return;
    if(k < lines.length){
      h.innerHTML += `<div class="genline">${lines[k]}</div>`;
      k++;
      setTimeout(tick, 650);
    } else {
      setTimeout(() => { S.generated = true; draw(); }, 500);
    }
  };
  setTimeout(tick, 500);
}

// =====================================================================
// Reset
// =====================================================================
function reset(){
  clearInterval(recTimer);
  _navHistory = [];
  S = {
    i:0, photo:false, known:'', shared:false, chatHTML:'', chatDone:false,
    picked:null, recording:null, recT:0, followups:[],
    selectedTypes:['card','timeline','archive','nfc'],
    generated:false, echoEnabled:[], expandedActivities:[], modal:null
  };
  draw();
}

// =====================================================================
// 键盘导航
// =====================================================================
window.addEventListener('keydown', e => {
  if(S.modal){
    if(e.key === 'Escape'){ S.modal = null; draw(); }
    return;
  }
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
});

draw();
</script>
</body>
