<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物语 · Thingstory — App 多页面交互原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app"></div>

<style>
  :root{
    --page:#1a1410; --page2:#241b16; --rail-line:#3a2f28;
    --rail-text:#f3eee3; --rail-sub:#a89c8a; --rail-faint:#7a6f64; --rail-cardbg:#221912;
    --vermil:#b3402f; --vermil-deep:#8c2f23; --gold:#c98b2e; --jade:#7a8c6f;
    --screen:#fbf8f1; --screen2:#f3eee3; --ink:#2b2622; --sub:#6b6258;
    --faint:#9a9186; --line:#cfc6b6; --line2:#e8e0d0; --tint:#fdf3e2;
    --green-soft:#e3eadb;
    --serif:'Cormorant Garamond','Songti SC','STSong',Georgia,serif;
    --sans:'Noto Sans SC','PingFang SC','Hiragino Sans GB',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--page);min-height:100vh}
  #app{font-family:var(--sans);color:var(--rail-text);background:var(--page);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px}
  .wrap{display:flex;justify-content:center}
  ::selection{background:rgba(201,139,46,.3)}

  /* ===== 顶部说明区 (海报式) ===== */
  header.top{border-bottom:1px solid var(--rail-line);padding-bottom:20px;margin-bottom:8px}
  header.top .kicker{font-size:10.5px;letter-spacing:3.5px;color:var(--vermil);font-weight:700;text-transform:uppercase}
  header.top h1{font-family:var(--serif);font-size:33px;font-weight:600;margin-top:8px;letter-spacing:-.3px}
  header.top h1 em{font-style:italic;color:var(--gold)}
  header.top .sub{color:var(--rail-sub);font-size:13px;margin-top:7px;letter-spacing:.3px;max-width:680px;line-height:1.6}

  /* ===== 页签说明条 ===== */
  .pagenote{display:flex;gap:10px;align-items:flex-start;margin:18px 0 6px;
    color:var(--rail-faint);font-size:11.5px;letter-spacing:.3px;line-height:1.6}
  .pagenote .badge{flex:none;font-family:var(--serif);font-style:italic;font-size:13px;
    color:var(--gold);border:1px solid var(--rail-line);border-radius:20px;padding:3px 12px;background:var(--page2)}
  .pagenote b{color:var(--rail-sub);font-weight:500}

  /* ===== 两栏布局 ===== */
  .stage-grid{display:flex;justify-content:center}

  /* ===== 手机外壳 ===== */
  .phone{width:348px;height:730px;position:sticky;top:22px;border-radius:58px;padding:11px;
    background:linear-gradient(155deg,#3a3a3f 0%,#1c1c1f 28%,#2a2a2d 52%,#161618 78%,#36363a 100%);
    box-shadow:0 1px 1px rgba(255,255,255,.16) inset,0 0 0 2px #0b0b0d,
      0 2px 6px rgba(0,0,0,.45),0 30px 60px -22px rgba(0,0,0,.6),0 56px 96px -44px rgba(0,0,0,.45)}
  .phone .vbtn{position:absolute;left:-2px;border-radius:3px;width:3px;
    background:linear-gradient(#43434a,#1c1c1f);box-shadow:-1px 0 1px rgba(0,0,0,.4)}
  .phone .vbtn.mute{top:124px;height:30px}
  .phone .vbtn.up{top:172px;height:56px}
  .phone .vbtn.dn{top:236px;height:56px}
  .phone .pwr{position:absolute;right:-2px;top:178px;width:3px;height:80px;border-radius:3px;
    background:linear-gradient(#43434a,#1c1c1f);box-shadow:1px 0 1px rgba(0,0,0,.4)}
  .screen{width:100%;height:100%;background:var(--screen);border-radius:47px;overflow:hidden;
    display:flex;flex-direction:column;position:relative;box-shadow:0 0 0 1px rgba(0,0,0,.55) inset}
  .notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:108px;height:30px;
    background:#000;border-radius:16px;z-index:40}
  .notch::after{content:"";position:absolute;right:12px;top:50%;transform:translateY(-50%);
    width:8px;height:8px;border-radius:50%;background:#0c1216;
    box-shadow:0 0 0 1px rgba(255,255,255,.05),0 0 2px rgba(80,140,180,.5) inset}
  .sbar{padding:17px 26px 2px;display:flex;justify-content:space-between;align-items:center;
    font-size:12px;font-weight:600;color:var(--ink);flex:none;z-index:30}
  .sbar .rgt{display:flex;align-items:center;gap:6px}
  .sbar .rgt svg{display:block;color:var(--ink)}
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:124px;height:5px;border-radius:3px;background:rgba(43,38,34,.26);z-index:40}

  /* ===== 滚动视口 ===== */
  .viewport{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;
    -webkit-overflow-scrolling:touch}
  .viewport::-webkit-scrollbar{width:0}
  .vp-pad{padding:0 18px 96px}

  /* ===== app bar (页面内) ===== */
  .appbar{padding:6px 20px 10px;display:flex;align-items:center;gap:10px;flex:none}
  .appbar .ab-back{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);
    background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);
    transition:.15s;flex:none}
  .appbar .ab-back svg{width:16px;height:16px}
  .appbar .ab-back:hover{background:var(--screen2)}
  .appbar .ab-title{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);letter-spacing:.2px}
  .appbar .ab-actions{margin-left:auto;display:flex;gap:8px}
  .appbar .ab-ico{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);
    background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);transition:.15s}
  .appbar .ab-ico:hover{background:var(--screen2);color:var(--ink)}
  .appbar .ab-ico svg{width:16px;height:16px}

  /* ===== 通用文字 ===== */
  .eyebrow{font-size:9.5px;letter-spacing:2.6px;color:var(--vermil);font-weight:700;text-transform:uppercase}
  .h-serif{font-family:var(--serif);font-weight:600;color:var(--ink)}
  .muted{color:var(--sub)}
  .faintc{color:var(--faint)}

  /* ===== 首页 header ===== */
  .home-head{padding:8px 4px 14px}
  .home-greet{font-size:12px;color:var(--faint);letter-spacing:.3px}
  .home-name{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink);margin-top:2px}
  .home-name .role{font-size:11px;font-family:var(--sans);font-weight:400;color:var(--vermil);
    background:var(--tint);border:1px solid #f0dcb8;padding:2px 8px;border-radius:12px;margin-left:8px;vertical-align:middle;letter-spacing:.2px}
  .home-stats{display:flex;gap:0;margin-top:14px;border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:#fff}
  .home-stats .st{flex:1;padding:11px 6px;text-align:center;border-right:1px solid var(--line2)}
  .home-stats .st:last-child{border-right:0}
  .home-stats .st .n{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--ink);line-height:1}
  .home-stats .st .l{font-size:9.5px;color:var(--faint);margin-top:4px;letter-spacing:.4px}

  /* ===== 卡片通用 ===== */
  .card{background:#fff;border:1px solid var(--line2);border-radius:16px;padding:14px;margin-bottom:12px}
  .sec-h{display:flex;align-items:baseline;gap:8px;margin:18px 2px 10px}
  .sec-h .t{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink)}
  .sec-h .more{margin-left:auto;font-size:11px;color:var(--vermil);cursor:pointer}
  .sec-h .more:hover{text-decoration:underline}

  /* ===== Echo widget (首页置顶) ===== */
  .echo-w{background:linear-gradient(150deg,#2a1d16,#3a2a1f);border:1px solid #4a3526;
    border-radius:18px;padding:16px;color:var(--rail-text);position:relative;overflow:hidden;margin-bottom:14px;cursor:pointer;transition:.18s}
  .echo-w:hover{transform:translateY(-1px);box-shadow:0 8px 22px -10px rgba(0,0,0,.5)}
  .echo-w::before{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;
    border-radius:50%;background:radial-gradient(circle,rgba(201,139,46,.22),transparent 70%)}
  .echo-w .ew-tag{font-size:9.5px;letter-spacing:1.6px;color:var(--gold);font-weight:700;text-transform:uppercase}
  .echo-w .ew-trig{font-size:11px;color:var(--rail-sub);margin-top:7px}
  .echo-w .ew-title{font-family:var(--serif);font-size:18px;font-weight:600;margin-top:6px;line-height:1.35}
  .echo-w .ew-wave{display:flex;align-items:flex-end;gap:2px;height:22px;margin-top:11px}
  .echo-w .ew-wave i{width:2.5px;background:var(--gold);border-radius:2px;opacity:.65}
  .echo-w .ew-acts{display:flex;gap:7px;margin-top:13px}
  .echo-w .ew-acts button{font-family:var(--sans);font-size:11px;padding:6px 12px;border-radius:18px;cursor:pointer;border:1px solid #5a4332;background:transparent;color:var(--rail-text);transition:.15s}
  .echo-w .ew-acts button.pri{background:var(--vermil);border-color:var(--vermil);color:#fff}
  .echo-w .ew-acts button:hover{border-color:var(--gold)}

  /* ===== feed (家人动态) ===== */
  .feed-item{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line2);cursor:pointer}
  .feed-item:last-child{border-bottom:0}
  .feed-item:hover .fi-name{color:var(--vermil)}
  .avatar{width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:16px;font-weight:600;color:#fff}
  .fi-body{flex:1;min-width:0}
  .fi-top{display:flex;align-items:baseline;gap:6px}
  .fi-name{font-size:13px;font-weight:500;color:var(--ink);transition:.15s}
  .fi-time{font-size:10px;color:var(--faint);margin-left:auto;flex:none}
  .fi-text{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.5}
  .fi-obj{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:10.5px;color:var(--vermil);
    background:var(--tint);border:1px solid #f0dcb8;padding:3px 9px;border-radius:12px}

  /* ===== 博物馆精选 横滑 ===== */
  .hscroll{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 8px;scroll-snap-type:x mandatory}
  .hscroll::-webkit-scrollbar{height:0}
  .mini-obj{flex:none;width:128px;scroll-snap-align:start;cursor:pointer}
  .mini-obj .mo-img{width:128px;height:128px;border-radius:13px;overflow:hidden;border:1px solid var(--line2);position:relative}
  .mini-obj .mo-img img{width:100%;height:100%;object-fit:cover}
  .mini-obj .mo-name{font-size:11.5px;color:var(--ink);margin-top:7px;font-weight:500}
  .mini-obj .mo-meta{font-size:9.5px;color:var(--faint);margin-top:1px}

  /* 物件占位图 (CSS 生成,待替换为真图) */
  .obj-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
  .obj-ph::after{content:"";position:absolute;inset:0;background:
    repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 7px,transparent 7px 14px)}

  /* 状态徽章 */
  .badge-st{position:absolute;left:7px;bottom:7px;font-size:9px;padding:3px 8px;border-radius:11px;
    font-weight:500;letter-spacing:.2px;backdrop-filter:blur(4px);display:inline-flex;align-items:center;gap:3px}
  .st-archiving{background:rgba(179,64,47,.92);color:#fff}
  .st-collecting{background:rgba(201,139,46,.92);color:#fff}
  .st-completed{background:rgba(122,140,111,.94);color:#fff}
  .st-archived{background:rgba(120,114,106,.9);color:#fff}

  /* ===== nudge ===== */
  .nudge{display:flex;gap:11px;align-items:center;background:var(--green-soft);border:1px solid #cdd8c2;
    border-radius:14px;padding:12px 13px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .nudge:hover{transform:translateY(-1px)}
  .nudge .nu-ic{font-size:20px;flex:none}
  .nudge .nu-t{font-size:12.5px;color:#3f4a36;font-weight:500}
  .nudge .nu-d{font-size:10.5px;color:#5d6650;margin-top:2px;line-height:1.4}
  .nudge .nu-arr{margin-left:auto;color:#7a8c6f;font-size:16px;flex:none}

  /* ===== 博物馆 物件 grid ===== */
  .seg{display:flex;gap:5px;background:var(--screen2);border-radius:11px;padding:3px;margin:6px 2px 14px}
  .seg button{flex:1;font-family:var(--sans);font-size:11px;padding:7px 4px;border-radius:8px;border:0;
    background:transparent;color:var(--sub);cursor:pointer;transition:.15s;font-weight:500}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

  .sortbar{display:flex;gap:8px;align-items:center;margin:0 2px 12px;font-size:11px;color:var(--faint)}
  .sortbar .sopt{cursor:pointer;padding:3px 0}
  .sortbar .sopt.on{color:var(--vermil);font-weight:500}

  .obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .obj-card{cursor:pointer}
  .obj-card .oc-img{width:100%;aspect-ratio:1;border-radius:13px;overflow:hidden;border:1px solid var(--line2);position:relative}
  .obj-card .oc-img img{width:100%;height:100%;object-fit:cover;transition:.3s}
  .obj-card:hover .oc-img img{transform:scale(1.04)}
  .obj-card .oc-name{font-size:12px;color:var(--ink);margin-top:7px;font-weight:500}
  .obj-card .oc-meta{font-size:9.5px;color:var(--faint);margin-top:1px}

  /* ===== 六种记录方式 ===== */
  .method-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .method{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line2);
    border-radius:14px;padding:12px;cursor:pointer;transition:.16s;position:relative}
  .method:hover{transform:translateY(-1px);box-shadow:0 6px 16px -10px rgba(0,0,0,.3)}
  .method.locked{opacity:.62;cursor:default}
  .method.locked:hover{transform:none;box-shadow:none}
  .method .m-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:21px;flex:none;color:#fff}
  .method .m-body{flex:1;min-width:0}
  .method .m-top{display:flex;align-items:baseline;gap:7px}
  .method .m-name{font-size:13px;font-weight:600;color:var(--ink)}
  .method .m-tag{font-size:8.5px;letter-spacing:1px;font-weight:700;color:var(--faint)}
  .method .m-d{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.45}
  .method .m-cnt{margin-left:auto;flex:none;text-align:right}
  .method .m-cnt .c{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);line-height:1}
  .method .m-cnt .cl{font-size:8.5px;color:var(--faint);margin-top:2px}
  .tier-pill{font-size:8px;padding:1px 6px;border-radius:9px;font-weight:700;letter-spacing:.4px}
  .tier-mvp{background:#e3eadb;color:#5b6b4d}
  .tier-v2{background:#f3e3d0;color:#9a6a2a}
  .tier-v3{background:#ece3e8;color:#8a5a78}

  /* ===== 延伸入口卡 ===== */
  .gateway{background:linear-gradient(150deg,#3a2a1f,#241b16);border:1px solid #4a3526;border-radius:18px;
    padding:18px;color:var(--rail-text);margin-top:14px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .gateway:hover{transform:translateY(-1px);box-shadow:0 10px 26px -12px rgba(0,0,0,.55)}
  .gateway::after{content:"→";position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--gold)}
  .gateway .gw-k{font-size:9.5px;letter-spacing:2px;color:var(--gold);font-weight:700;text-transform:uppercase}
  .gateway .gw-t{font-family:var(--serif);font-size:19px;font-weight:600;margin-top:6px}
  .gateway .gw-d{font-size:11.5px;color:var(--rail-sub);margin-top:5px;line-height:1.5;max-width:230px}

  /* ===== 物件详情页 ===== */
  .det-hero{width:100%;aspect-ratio:1;border-radius:0;overflow:hidden;position:relative;background:var(--screen2)}
  .det-hero img{width:100%;height:100%;object-fit:cover}
  .det-hero .dh-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,16,12,.45),transparent 45%)}
  .det-hero .dh-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
  .det-hero .dh-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
  .det-hero .dh-dots i.on{background:#fff;width:16px;border-radius:3px}
  .det-meta{padding:14px 2px 4px}
  .det-name{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--ink);line-height:1.2}
  .det-tags{display:flex;gap:7px;align-items:center;margin-top:9px;flex-wrap:wrap}
  .chip{font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(--line2);color:var(--sub);background:#fff}
  .chip.type{background:var(--tint);border-color:#f0dcb8;color:#9a6a2a}
  .det-byline{font-size:11px;color:var(--faint);margin-top:10px}

  .det-block{margin-top:18px}
  .db-h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .db-h .db-ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex:none}
  .db-h .db-t{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink)}
  .db-h .db-tag{font-size:8px;letter-spacing:.8px;font-weight:700;margin-left:auto}

  /* 故事卡片 */
  .story-card{background:linear-gradient(160deg,#fdfaf3,#f6efe1);border:1px solid var(--line2);
    border-radius:15px;padding:16px;position:relative;overflow:hidden}
  .story-card::before{content:"“";position:absolute;right:14px;top:-6px;font-family:var(--serif);
    font-size:64px;color:rgba(201,139,46,.18);line-height:1}
  .story-card .sc-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink)}
  .story-card .sc-body{font-size:12.5px;color:var(--sub);line-height:1.75;margin-top:9px}
  .story-card .sc-foot{display:flex;align-items:center;gap:7px;margin-top:13px;padding-top:11px;border-top:1px solid var(--line2)}
  .story-card .sc-share{margin-left:auto;font-size:11px;color:var(--vermil);cursor:pointer;display:flex;align-items:center;gap:4px}

  /* 录音 */
  .voice-row{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line2);border-radius:13px;padding:12px;cursor:pointer;transition:.15s}
  .voice-row:hover{border-color:var(--vermil)}
  .voice-row .vr-play{width:36px;height:36px;border-radius:50%;background:var(--vermil);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;font-size:13px}
  .voice-row .vr-body{flex:1;min-width:0}
  .voice-row .vr-wave{display:flex;align-items:center;gap:2px;height:20px}
  .voice-row .vr-wave i{flex:1;background:var(--line);border-radius:2px;min-width:1.5px}
  .voice-row .vr-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--faint)}
  .voice-stamp{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .voice-stamp .vs{font-size:10px;color:var(--sub);background:var(--screen2);border-radius:10px;padding:4px 9px;cursor:pointer}
  .voice-stamp .vs b{color:var(--vermil);font-weight:600}

  /* 附件 */
  .attach-grid{display:flex;gap:8px;flex-wrap:wrap}
  .attach-grid .at{width:64px;height:64px;border-radius:10px;border:1px solid var(--line2);background:var(--screen2);
    display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
  .attach-grid .at img{width:100%;height:100%;object-fit:cover}
  .note-line{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line2)}
  .note-line:last-child{border-bottom:0}
  .note-line .nl-body{flex:1}
  .note-line .nl-name{font-size:12px;font-weight:500;color:var(--ink)}
  .note-line .nl-text{font-size:11.5px;color:var(--sub);margin-top:2px;line-height:1.5}

  /* 关联家人 */
  .ppl-row{display:flex;gap:9px;overflow-x:auto;padding:2px 0 6px}
  .ppl-row::-webkit-scrollbar{height:0}
  .ppl{flex:none;text-align:center;width:58px;cursor:pointer}
  .ppl .avatar{margin:0 auto}
  .ppl .pn{font-size:10.5px;color:var(--ink);margin-top:5px}

  /* locked block preview */
  .locked-block{background:repeating-linear-gradient(135deg,#f6f1e7 0 10px,#f1ebdf 10px 20px);

  .locked-block .lb-ic{font-size:24px;opacity:.5}

  /* 详情底部操作栏 */
  .det-actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-top:20px;padding-top:14px;border-top:1px solid var(--line2)}
  .det-actions .da{text-align:center;cursor:pointer;padding:6px 2px;border-radius:10px;transition:.15s}
  .det-actions .da:hover{background:var(--screen2)}
  .det-actions .da .da-ic{font-size:17px}
  .det-actions .da .da-l{font-size:9.5px;color:var(--sub);margin-top:3px}

  /* ===== 家人 tab ===== */
  .fam-head{padding:6px 2px 12px}
  .fam-members{display:flex;gap:13px;overflow-x:auto;padding:12px 2px 4px}
  .fam-members::-webkit-scrollbar{height:0}
  .fam-mem{flex:none;text-align:center;width:60px;cursor:pointer}
  .fam-mem .avatar{margin:0 auto;width:48px;height:48px;font-size:19px}
  .fam-mem .fm-add{width:48px;height:48px;border-radius:50%;border:1.5px dashed var(--line);
    display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--faint);margin:0 auto}
  .fam-mem .fmn{font-size:10.5px;color:var(--ink);margin-top:6px}
  .fam-mem .fmr{font-size:9px;color:var(--faint)}

  /* 群聊 */
  .chat-msg{display:flex;gap:9px;margin-bottom:13px;align-items:flex-start}
  .chat-msg.me{flex-direction:row-reverse}
  .chat-msg .cm-bub{max-width:74%;padding:9px 12px;border-radius:14px;font-size:12.5px;line-height:1.55}
  .chat-msg.them .cm-bub{background:#fff;border:1px solid var(--line2);border-top-left-radius:4px;color:var(--ink)}
  .chat-msg.me .cm-bub{background:var(--vermil);color:#fff;border-top-right-radius:4px}
  .chat-msg.ai .cm-bub{background:var(--page2);color:var(--rail-text);border:1px solid var(--rail-line);font-size:12px;max-width:84%}
  .chat-msg .cm-name{font-size:9.5px;color:var(--faint);margin-bottom:3px}
  .chat-sys{text-align:center;font-size:10px;color:var(--faint);margin:10px 0}
  .chat-sys span{background:var(--screen2);padding:4px 12px;border-radius:12px}
  .chat-input{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line2);
    border-radius:22px;padding:7px 9px 7px 14px;margin-top:6px}
  .chat-input .ci-ph{flex:1;font-size:12px;color:var(--faint)}
  .chat-input .ci-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--sub)}
  .chat-input .ci-send{width:32px;height:32px;border-radius:50%;background:var(--vermil);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}

  /* 家人入口卡 */
  .fam-entry{display:flex;gap:11px;align-items:center;background:#fff;border:1px solid var(--line2);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;transition:.15s}
  .fam-entry:hover{transform:translateY(-1px);box-shadow:0 6px 16px -10px rgba(0,0,0,.3)}
  .fam-entry .fe-ic{font-size:20px;width:40px;height:40px;border-radius:11px;background:var(--tint);display:flex;align-items:center;justify-content:center;flex:none}
  .fam-entry .fe-t{font-size:13px;font-weight:500;color:var(--ink)}
  .fam-entry .fe-d{font-size:10.5px;color:var(--faint);margin-top:2px}
  .fam-entry .fe-arr{margin-left:auto;color:var(--faint);font-size:16px}

  /* ===== 提醒 tab (Echo) ===== */
  .echo-filter{display:flex;gap:6px;overflow-x:auto;padding:0 2px 14px}
  .echo-filter::-webkit-scrollbar{height:0}
  .echo-filter .ef{flex:none;font-size:11px;padding:5px 13px;border-radius:16px;border:1px solid var(--line2);
    background:#fff;color:var(--sub);cursor:pointer;transition:.15s}
  .echo-filter .ef.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .echo-card{background:#fff;border:1px solid var(--line2);border-radius:15px;padding:14px;margin-bottom:11px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .echo-card:hover{transform:translateY(-1px);box-shadow:0 6px 16px -10px rgba(0,0,0,.3)}
  .echo-card .ec-kind{font-size:9px;letter-spacing:1px;font-weight:700;padding:2px 8px;border-radius:9px;display:inline-block}
  .ek-jieqing{background:#e3eadb;color:#5b6b4d}
  .ek-qinren{background:#f3e3d0;color:#9a6a2a}
  .ek-leiji{background:#ece1d6;color:#8a5a3a}
  .ek-yanchi{background:#ece3e8;color:#8a5a78}
  .echo-card .ec-trig{font-size:11px;color:var(--faint);margin-top:9px}
  .echo-card .ec-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink);margin-top:5px;line-height:1.35}
  .echo-card .ec-desc{font-size:11.5px;color:var(--sub);margin-top:6px;line-height:1.55}
  .echo-sub{font-size:11px;color:var(--faint);margin:16px 2px 9px;letter-spacing:.3px;font-weight:500}

  /* ===== 底部 tab bar ===== */
  .tabbar{position:absolute;bottom:0;left:0;right:0;height:72px;background:rgba(251,248,241,.93);
    backdrop-filter:blur(14px);border-top:1px solid var(--line2);display:flex;align-items:flex-start;
    padding:9px 8px 0;z-index:30}
  .navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--faint);transition:.15s;position:relative}
  .navitem .nav-ico{width:23px;height:23px}
  .navitem .nav-l{font-size:9px;letter-spacing:.3px}
  .navitem.on{color:var(--vermil)}
  .navitem:hover{color:var(--vermil-deep)}
  .navitem.fab-slot{position:relative}
  .fab{position:absolute;left:50%;top:-22px;transform:translateX(-50%);width:54px;height:54px;border-radius:50%;
    background:linear-gradient(150deg,var(--vermil),var(--vermil-deep));display:flex;align-items:center;justify-content:center;
    color:#fff;box-shadow:0 6px 18px rgba(140,47,35,.45),0 1px 3px rgba(0,0,0,.2);cursor:pointer;transition:.18s;border:3px solid var(--screen)}
  .fab:hover{transform:translateX(-50%) scale(1.05)}
  .fab:active{transform:translateX(-50%) scale(.94)}
  .fab svg{width:26px;height:26px}
  .fab-label{font-size:9px;color:var(--faint);margin-top:34px;letter-spacing:.3px}
  .navitem.fab-slot.on .fab-label{color:var(--vermil)}

  /* ===== FAB 任务流 (模态) ===== */
  .modal-mask{position:absolute;inset:0;background:rgba(20,16,12,.5);backdrop-filter:blur(2px);z-index:50;
    display:flex;align-items:flex-end;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--screen);width:100%;border-radius:24px 24px 0 0;padding:20px 18px 26px;animation:slideup .26s cubic-bezier(.2,.7,.2,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .sh-bar{width:38px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 14px}
  .sheet .sh-t{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink);text-align:center}
  .sheet .sh-d{font-size:11.5px;color:var(--faint);text-align:center;margin-top:5px}
  .capgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:18px}
  .capgrid .cap{background:#fff;border:1px solid var(--line2);border-radius:13px;padding:14px 6px;text-align:center;cursor:pointer;transition:.15s}
  .capgrid .cap:hover{border-color:var(--vermil);transform:translateY(-1px)}
  .capgrid .cap .cap-ic{font-size:21px}
  .capgrid .cap .cap-l{font-size:10.5px;color:var(--sub);margin-top:6px;line-height:1.3}
  .sheet .sh-cancel{margin:18px auto 0;width:46px;height:46px;border-radius:50%;background:var(--screen2);
    display:flex;align-items:center;justify-content:center;color:var(--sub);cursor:pointer;font-size:18px}

  /* toast */
  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(43,38,34,.94);
    color:#fff;font-size:11.5px;padding:9px 16px;border-radius:20px;z-index:60;white-space:nowrap;
    animation:toastin .25s ease;max-width:88%;text-align:center}
  @keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* 设置页 */
  .set-group{margin-bottom:16px}
  .set-group .sg-t{font-size:10px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;font-weight:700;margin:0 2px 7px}
  .set-row{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line2);padding:13px;cursor:pointer;transition:.15s}
  .set-row:hover{background:var(--screen2)}
  .set-row:first-child{border-radius:13px 13px 0 0}
  .set-row:last-child{border-radius:0 0 13px 13px;border-top:0}
  .set-row:only-child{border-radius:13px}
  .set-row:not(:first-child):not(:last-child){border-top:0}
  .set-row .sr-l{font-size:12.5px;color:var(--ink)}
  .set-row .sr-v{margin-left:auto;font-size:11px;color:var(--faint)}
  .set-row .sw{margin-left:auto;width:38px;height:22px;border-radius:13px;background:var(--vermil);position:relative;flex:none}
  .set-row .sw::after{content:"";position:absolute;right:2px;top:2px;width:18px;height:18px;border-radius:50%;background:#fff}
  .set-row .sw.off{background:var(--line)}
  .set-row .sw.off::after{left:2px;right:auto}

  /* ===== 右栏说明卡 ===== */
  .right-col{display:flex;flex-direction:column;gap:14px;padding-top:6px}
  .ia-card{background:var(--page2);border:1px solid var(--rail-line);border-radius:16px;padding:18px 20px}
  .ia-card .ic-k{font-size:9.5px;letter-spacing:2.4px;color:var(--vermil);font-weight:700;text-transform:uppercase}
  .ia-card .ic-t{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--rail-text);margin-top:8px;letter-spacing:-.2px}
  .ia-card .ic-t em{font-style:italic;color:var(--gold)}
  .ia-card .ic-d{font-size:12.5px;color:var(--rail-sub);line-height:1.7;margin-top:11px}
  .ia-card .ic-d b{color:var(--rail-text);font-weight:500}
  .ia-list{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:11px}
  .ia-list li{display:flex;gap:11px;font-size:12px;color:var(--rail-sub);line-height:1.55}
  .ia-list li .li-n{flex:none;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:15px;width:22px}
  .ia-list li b{color:var(--rail-text);font-weight:500}

  .map-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .map-legend .ml{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--rail-sub)}
  .map-legend .ml .dot{width:9px;height:9px;border-radius:50%}

  .nav-hint{font-size:11px;color:var(--rail-faint);line-height:1.7;margin-top:6px}
  .nav-hint b{color:var(--rail-sub);font-weight:500}
  .kbd{font-family:var(--serif);font-style:italic;color:var(--gold);border:1px solid var(--rail-line);
    border-radius:6px;padding:0 7px;font-size:12px;background:var(--page)}

  /* 页脚 */
  footer.btm{margin-top:28px;border-top:1px solid var(--rail-line);padding-top:16px;
    font-size:10.5px;color:var(--rail-faint);letter-spacing:.4px;line-height:1.6;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  footer.btm em{font-family:var(--serif);font-style:italic;color:var(--rail-sub)}

  @media(max-width:860px){
    #app{padding:16px 8px}
  }
  @media(max-width:480px){
    html,body{background:var(--screen)}
    #app{padding:0;background:var(--screen);align-items:stretch}
    .wrap{width:100%}
    .stage-grid{justify-content:stretch}
    .phone{width:100vw;height:100dvh;border-radius:0;padding:0;background:none;
      box-shadow:none;position:relative}
    .phone .vbtn,.phone .pwr{display:none}
    .screen{border-radius:0;background:var(--screen)}
    .notch{display:none}
    .sbar{display:none}
  }

/* ---- 小工具 ---- */
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function avatar(memKey, size){
  const m = MEMBERS[memKey]; if(!m) return "";
  const s = size||38;
  return `<div class="avatar" style="background:${m.color};width:${s}px;height:${s}px;font-size:${Math.round(s*0.42)}px">${m.short}</div>`;
}
function objImage(o, cls){
  if(o.img){
    return `<img src="${o.img}" alt="${esc(o.name)}">`;
  }
  return `<div class="obj-ph" style="background:${o.phBg}">${o.phEmoji}</div>`;
}
function statusBadge(o){
  const s = STATUS[o.status];
  return `<span class="badge-st ${s.cls}">${s.ic} ${s.label}</span>`;
}
function waveBars(n, base){
  let h=""; for(let i=0;i<n;i++){const v=(base||6)+Math.round(Math.abs(Math.sin(i*1.3))*16);h+=`<i style="height:${v}px"></i>`;} return h;
}

      const rank={completed:0,collecting:1,archiving:2,archived:3};
      sorted.sort((a,b)=>rank[a.status]-rank[b.status]);
    }
    const grid = sorted.map(o=>`
      <div class="obj-card" data-act="detail" data-id="${o.id}">

/* ---------- 提醒 tab (Echo) ---------- */
function renderEcho(){
  const filters = [["all","All"],["jieqing","Seasonal"],["qinren","Kin"],["leiji","Accumulated"],["yanchi","Delayed"]];
  const fbar = filters.map(([k,l])=>`<div class="ef ${STATE.echoFilter===k?'on':''}" data-act="echo-filter" data-f="${k}">${l}</div>`).join("");
  const shown = ECHOES.filter(e=>STATE.echoFilter==="all"||e.kind===STATE.echoFilter);

  const groups = {"Today":[],"Next 7 Days":[],"History":[]};
  shown.forEach(e=>groups[e.when].push(e));

  function card(e){
    return `<div class="echo-card" data-act="echo-detail" data-obj="${e.obj}">
      <span class="ec-kind ek-${e.kind}">${esc(e.kindLabel)}</span>
      <div class="ec-trig">${esc(e.trig)}</div>
      <div class="ec-title">${esc(e.title)}</div>
      <div class="ec-desc">${esc(e.desc)}</div></div>`;
  }
  let body="";
  ["Today","Next 7 Days","History"].forEach(g=>{
    if(groups[g].length){
      body += `<div class="echo-sub">${g}</div>` + groups[g].map(card).join("");
    }
  });
  if(!body) body = `<div style="text-align:center;color:var(--faint);font-size:12px;padding:30px 0">No Echoes in this category.</div>`;

  return `
  <div class="appbar"><span class="ab-title">Reminders</span>
    <div class="ab-actions"><div class="ab-ico" data-act="toast" data-msg="Echo settings: 4 trigger types / silent hours">${I.settings}</div></div></div>
  <div class="vp-pad">
    <div class="echo-filter">${fbar}</div>
    ${body}
  </div>`;
}

/* 当前页面 → viewport 内 HTML */
function renderScreen(){
  const v = STATE.view;
  if(v){
    if(v.type==="detail") return renderDetail(v.id);
    if(v.type==="member") return renderMember(v.id);
    if(v.type==="method") return renderMethod(v.id);
    if(v==="chat")     return renderChat();
    if(v==="settings") return renderSettings();
    if(v==="gateway")  return renderGateway();
    if(v==="invite")   return renderInvite();
    if(v.type==="echoDetail") return renderEchoDetail(v.obj);
  }
  switch(STATE.tab){
    case "home":   return renderHome();
    case "museum": return renderMuseum();
    case "family": return renderFamily();
    case "echo":   return renderEcho();
  }
  return renderHome();
}

/* tab bar */
function renderTabBar(){
  const activeTab = STATE.view ? null : STATE.tab;
  const items = NAV_TABS.map(t=>{
    if(t.isFab){
      return `<div class="navitem fab-slot" data-act="fab">
        <div class="fab">${NAV_ICONS.camera}</div>
        <div class="fab-label">${t.label}</div></div>`;
    }
    const on = activeTab===t.key ? "on" : "";
    return `<div class="navitem ${on}" data-act="tab" data-tab="${t.key}">
      ${NAV_ICONS[t.icon]}<div class="nav-l">${t.label}</div></div>`;
  }).join("");
  return `<div class="tabbar">${items}</div>`;
}

    echoDetail:{k:"多入口 · 单实体",t:"<em>同一个</em>详情页",
      d:"推送 / 首页 widget / 提醒 tab — 三个入口点进来,看到的是<b>同一个 Echo 详情页</b>,同样的内容、同样的操作。这是经典的多入口单实体模式。",
      list:[["①","触发原因 + 关联录音片段 + 关联物件"],["②","查看物件 / 启动新一轮记录 / 分享 / 稍后"],["③","Echo 既是终点,也是新档案的起点"]]},
    invite:{k:"家人 · 邀请",t:"viral <em>外发</em>",
      d:"邀请链接必须能<b>外发到微信、短信</b>,不锁在 app 内 — 这是增长关键。完整流程需 app,但留言/看故事/看照片,H5 就够,触达得到老一辈。",
      list:[["①","名字 + 关系(将出现在关系图)"],["②","完整成员 vs <b>轻量成员</b>(V2 · H5/小程序)"],["③","链接 + 二维码 · 微信/短信 · 通知全员"]]},
    settings:{k:"全局 · 设置",t:"不占 tab 的<em>入口</em>",
      d:"设置入口放在首页右上角,不占底部 tab。包含个人信息、通知偏好、隐私、关于四组 — 标准但完整的 MVP 设置面。",
      list:[["①","个人信息 + 我在家庭里的角色"],["②","通知偏好:总开关 / Echo / 静默时段"],["③","隐私(导出 V2)+ 关于(版本 1.0 MVP)"]]},
    add:{k:"FAB · 添加老物",t:"穿越 tab 的<em>任务流</em>",
      d:"FAB 不是常驻页面,是触发任务流的按钮。任务流期间 tab bar 隐藏(沉浸拍照),完成后<b>强制落地到博物馆首页</b> — 让你看到东西已经存到家里了。",
      list:[["①","拍照 / 录音 / 录像 — 借鉴对标品的 6 入口捕获面"],["②","AI 识别预填名称/类型,可中途退出存草稿"],["③","完成 → 博物馆首页,状态 = 等待故事补全"]]}
  };

  card = cards[where] || cards.home;

  const liHtml = card.list.map(([n,t])=>`<li><span class="li-n">${n}</span><span>${t}</span></li>`).join("");

  return `
  <div class="right-col">
    <div class="ia-card">
      <div class="ic-k">${card.k}</div>
      <div class="ic-t">${card.t}</div>
      <div class="ic-d">${card.d}</div>
      <ul class="ia-list">${liHtml}</ul>
    </div>
    <div class="ia-card" style="background:var(--page)">
      <div class="ic-k">如何使用</div>
      <div class="nav-hint" style="margin-top:8px">
        这是可点击的真原型。底部 <span class="kbd">4 tab + FAB</span> 在 5 个常驻页间切换;
        点物件卡进<b>详情页</b>,点 <b>← 返回</b>回上一层。右侧说明会跟着你当前所在的页面更新。
      </div>
      <div class="nav-hint" style="margin-top:10px">
        5 件传家物均已是实拍照片(香包/蓝布褂子/陈皮罐/海鸥相机/粮票),
        统一裁成方形嵌入。日后换图只需改 <span class="kbd">OBJ_IMG</span> 一处。
      </div>
    </div>
  </div>`;
}

/* ============================================================================
   主渲染 — 拼装整页
   ============================================================================ */
let _lastKey = "";
function render(){
  const now = new Date();
  const screenHtml = renderScreen();
  const html = `
  <div class="wrap">
    <div class="stage-grid">
      <div class="phone">
        <div class="vbtn mute"></div><div class="vbtn up"></div><div class="vbtn dn"></div><div class="pwr"></div>
        <div class="screen">
          <div class="notch"></div>
          <div class="sbar"><span>9:41</span><span class="rgt">${SBAR_SIGNAL}${SBAR_WIFI}${SBAR_BATTERY}</span></div>
          ${homeTopBar()}
          <div class="viewport" id="viewport">${screenHtml}</div>
          ${renderTabBar()}
          ${renderModal()}
          <div class="home-ind"></div>
        </div>
      </div>
    </div>
  </div>`;
  $app().innerHTML = html;
  // 还原滚动
  const vp = document.getElementById("viewport");
  if(vp) vp.scrollTop = (_lastKey===keyOf()) ? STATE.scroll : 0;
}
function keyOf(){return STATE.tab+"|"+JSON.stringify(STATE.view);}

/* ============================================================================
   事件委托
   ============================================================================ */
function toast(msg){
  const old=document.querySelector(".toast"); if(old) old.remove();
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.querySelector(".screen").appendChild(t);
  setTimeout(()=>t.remove(),1900);
}

document.addEventListener("click",e=>{
  // 保存滚动位置
  const vp=document.getElementById("viewport");
  if(vp){STATE.scroll=vp.scrollTop; _lastKey=keyOf();}

  const el = e.target.closest("[data-act]");
  if(e.target.closest("[data-stop]") && !el) return;
  if(!el) return;
  const act = el.dataset.act;

  switch(act){
    case "tab":
      STATE.tab = el.dataset.tab; STATE.view=null; STATE.modal=null; _lastKey=""; render(); break;
    case "detail":
      STATE.view={type:"detail",id:el.dataset.id}; _lastKey=""; render(); break;
    case "member":
      STATE.view={type:"member",id:el.dataset.id}; _lastKey=""; render(); break;
    case "method":
      STATE.view={type:"method",id:el.dataset.id}; _lastKey=""; render(); break;
    case "chat":      STATE.view="chat"; _lastKey=""; render(); break;
    case "settings":  STATE.view="settings"; _lastKey=""; render(); break;
    case "gateway":   STATE.view="gateway"; _lastKey=""; render(); break;
    case "invite":    STATE.view="invite"; _lastKey=""; render(); break;
    case "echo":      STATE.tab="echo"; STATE.view=null; _lastKey=""; render(); break;
    case "echo-detail":
      STATE.view={type:"echoDetail",obj:el.dataset.obj||"sachet"}; _lastKey=""; render(); break;
    case "back":
      STATE.view=null; _lastKey=""; render(); break;
    case "seg":
      STATE.museumSeg=el.dataset.seg; render(); break;
    case "sort":
      STATE.museumSort=el.dataset.sort; render(); break;
    case "echo-filter":
      STATE.echoFilter=el.dataset.f; render(); break;
    case "fab":
      STATE.modal="add"; render(); break;
    case "modal-close":
      STATE.modal=null; render(); break;
    case "add-capture":
      STATE.modal=null;
      // 模拟完成 → 落地博物馆首页
      STATE.tab="museum"; STATE.view=null; STATE.museumSeg="object"; _lastKey="";
      render(); toast("已存档 · 进入博物馆 · 状态 = 等待故事补全"); break;
    case "toast":
      toast(el.dataset.msg||"演示操作"); break;
  }
});

/* 启动 */
render();
</script>
</body>
</html>
